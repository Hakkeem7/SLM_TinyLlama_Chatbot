<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chatbot UI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .chat-container{
            width:400px;
            height:600px;
            background:#fff;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            display:flex;
            flex-direction:column;
            overflow:hidden;
        }

        .header{
            background:#4CAF50;
            color:white;
            padding:15px;
            text-align:center;
            font-size:20px;
            font-weight:bold;
        }

        .chat-box{
            flex:1;
            padding:15px;
            overflow-y:auto;
            background:#f9f9f9;
        }

        .message{
            margin:10px 0;
            padding:10px 15px;
            border-radius:10px;
            width:fit-content;
            max-width:75%;
        }

        .bot{
            background:#e4e6eb;
            align-self:flex-start;
        }

        .user{
            background:#4CAF50;
            color:white;
            margin-left:auto;
        }

        .input-area{
            display:flex;
            padding:10px;
            border-top:1px solid #ddd;
        }

        .input-area input{
            flex:1;
            padding:10px;
            border:1px solid #ccc;
            border-radius:20px;
            outline:none;
        }

        .input-area button{
            margin-left:10px;
            padding:10px 20px;
            border:none;
            border-radius:20px;
            background:#4CAF50;
            color:white;
            cursor:pointer;
        }

        .input-area button:hover{
            background:#45a049;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        🤖 Deepseek AI Chatbot
    </div>

    <div class="chat-box">
        <div class="message bot">
            Hello! How can I help you today?
            <p>{{ output }}</p>
        </div>
    </div>

    <div class="input-area">
        <form method="POST" >
            <input type="text" name="user" placeholder="Type your message here..." required>
            <button type="submit">Submit</button>
            
        </form>
    </div>

</div>

</body>
</html>
