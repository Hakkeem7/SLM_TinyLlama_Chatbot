<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flask Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eceff1;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{

width:420px;
height:650px;

background:white;

display:flex;
flex-direction:column;

border-radius:15px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,.2);

}

.header{

background:#3f51b5;

color:white;

padding:15px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:20px;

font-weight:bold;

}

.header a{

text-decoration:none;

color:white;

background:red;

padding:5px 12px;

border-radius:5px;

font-size:14px;

}

.chat-box{

flex:1;

padding:15px;

overflow-y:auto;

display:flex;

flex-direction:column;

background:#f4f4f4;

}

.message{

padding:10px 15px;

margin:8px 0;

border-radius:12px;

max-width:75%;

word-wrap:break-word;

}

.user{

align-self:flex-end;

background:#3f51b5;

color:white;

}

.bot{

align-self:flex-start;

background:white;

border:1px solid #ddd;

}

.input-area{

padding:10px;

background:white;

}

form{

display:flex;

}

input{

flex:1;

padding:10px;

border-radius:20px;

border:1px solid #ccc;

outline:none;

}

button{

margin-left:10px;

padding:10px 18px;

border:none;

background:#3f51b5;

color:white;

border-radius:20px;

cursor:pointer;

}

button:hover{

background:#2d3ea8;

}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">

<span>🤖 Ollama Chatbot</span>

<a href="/clear">Clear</a>

</div>

<div class="chat-box">

{% if messages %}

{% for msg in messages %}

<div class="message {{ msg.role }}">

{{ msg.content }}

</div>

{% endfor %}

{% else %}

<div class="message bot">

Hello 👋 Ask me anything.

</div>

{% endif %}

</div>

<div class="input-area">

<form method="POST">

<input
type="text"
name="user"
placeholder="Type your message..."
required
autocomplete="off">

<button type="submit">
Send
</button>

</form>

</div>

</div>

</body>

</html>
